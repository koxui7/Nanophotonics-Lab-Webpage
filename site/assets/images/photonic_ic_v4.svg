<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- 背景：深蓝黑 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1a35"/>
      <stop offset="40%" stop-color="#061023"/>
      <stop offset="100%" stop-color="#01030a"/>
    </radialGradient>

    <!-- 中央芯片核心光 -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#aaeeff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#44bbff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0"/>
    </radialGradient>

    <!-- 中央芯片表面 -->
    <linearGradient id="chipTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aaddff"/>
      <stop offset="50%" stop-color="#66aadd"/>
      <stop offset="100%" stop-color="#2266aa"/>
    </linearGradient>

    <!-- 芯片侧面 -->
    <linearGradient id="chipSideL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#224a7a"/>
      <stop offset="100%" stop-color="#0a2040"/>
    </linearGradient>
    <linearGradient id="chipSideR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a2040"/>
      <stop offset="100%" stop-color="#1a3860"/>
    </linearGradient>

    <!-- 强发光滤镜 -->
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="mediumBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="heavyBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="extremeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ========== 背景 ========== -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- 巨大的中央光晕 -->
  <circle cx="960" cy="540" r="700" fill="url(#coreGlow)" opacity="0.5"/>
  <circle cx="960" cy="540" r="400" fill="url(#coreGlow)" opacity="0.6"/>

  <!-- ============ 远景层（最模糊，强景深）============ -->
  <g filter="url(#extremeBlur)" opacity="0.6">
    <!-- 远处的电路网格，极度模糊 -->
    <g stroke="#3a7ac0" stroke-width="8" fill="none" opacity="0.7">
      <path d="M 100 100 L 400 100 L 400 300 L 700 300"/>
      <path d="M 1500 150 L 1200 150 L 1200 350 L 900 350"/>
      <path d="M 200 900 L 500 900 L 500 700 L 800 700"/>
      <path d="M 1700 850 L 1400 850 L 1400 650 L 1100 650"/>
      <path d="M 50 500 L 300 500 L 300 650"/>
      <path d="M 1850 500 L 1600 500 L 1600 350"/>
    </g>
    <!-- 远处的亮点（模糊圆球） -->
    <circle cx="250" cy="200" r="15" fill="#66bbff"/>
    <circle cx="1650" cy="180" r="12" fill="#66bbff"/>
    <circle cx="300" cy="850" r="14" fill="#66bbff"/>
    <circle cx="1600" cy="820" r="13" fill="#66bbff"/>
    <circle cx="150" cy="550" r="10" fill="#88ccff"/>
    <circle cx="1780" cy="500" r="11" fill="#88ccff"/>
  </g>

  <!-- ============ 中景层（中等模糊）============ -->
  <g filter="url(#heavyBlur)" opacity="0.75">
    <!-- 从中央向外发散的主电路迹 -->
    <g stroke="#66bbff" stroke-width="6" fill="none">
      <!-- 向左上发散 -->
      <path d="M 960 540 L 700 540 L 700 380 L 400 380 L 400 200 L 200 200"/>
      <path d="M 960 540 L 750 540 L 750 320 L 500 320"/>
      <!-- 向右上 -->
      <path d="M 960 540 L 1220 540 L 1220 380 L 1520 380 L 1520 200 L 1720 200"/>
      <path d="M 960 540 L 1170 540 L 1170 320 L 1420 320"/>
      <!-- 向左下 -->
      <path d="M 960 540 L 700 540 L 700 700 L 400 700 L 400 880 L 200 880"/>
      <path d="M 960 540 L 750 540 L 750 760 L 500 760"/>
      <!-- 向右下 -->
      <path d="M 960 540 L 1220 540 L 1220 700 L 1520 700 L 1520 880 L 1720 880"/>
      <path d="M 960 540 L 1170 540 L 1170 760 L 1420 760"/>
      <!-- 正上方/下方/左/右 -->
      <path d="M 960 540 L 960 300 L 800 300"/>
      <path d="M 960 540 L 960 780 L 1100 780"/>
      <path d="M 960 540 L 300 540"/>
      <path d="M 960 540 L 1620 540"/>
    </g>
    <!-- 沿路径的亮点 -->
    <g fill="#aaddff">
      <circle cx="700" cy="540" r="5"/>
      <circle cx="400" cy="380" r="5"/>
      <circle cx="1220" cy="540" r="5"/>
      <circle cx="1520" cy="380" r="5"/>
      <circle cx="700" cy="700" r="5"/>
      <circle cx="1220" cy="700" r="5"/>
      <circle cx="500" cy="320" r="4"/>
      <circle cx="1420" cy="320" r="4"/>
      <circle cx="500" cy="760" r="4"/>
      <circle cx="1420" cy="760" r="4"/>
    </g>
  </g>

  <!-- ============ 近景背景层（轻微模糊，较清晰的电路轨迹）============ -->
  <g filter="url(#mediumBlur)" opacity="0.85">
    <!-- 放射状的电路迹（主干） -->
    <g stroke="#88ccff" stroke-width="3" fill="none">
      <!-- 左侧 -->
      <path d="M 860 540 L 640 540 L 640 440 L 400 440"/>
      <path d="M 860 540 L 640 540 L 640 640 L 400 640"/>
      <path d="M 860 490 L 700 490 L 700 340 L 500 340 L 500 240"/>
      <path d="M 860 590 L 700 590 L 700 740 L 500 740 L 500 840"/>
      
      <!-- 右侧 -->
      <path d="M 1060 540 L 1280 540 L 1280 440 L 1520 440"/>
      <path d="M 1060 540 L 1280 540 L 1280 640 L 1520 640"/>
      <path d="M 1060 490 L 1220 490 L 1220 340 L 1420 340 L 1420 240"/>
      <path d="M 1060 590 L 1220 590 L 1220 740 L 1420 740 L 1420 840"/>

      <!-- 上下 -->
      <path d="M 920 440 L 920 300 L 800 300"/>
      <path d="M 1000 440 L 1000 300 L 1120 300"/>
      <path d="M 920 640 L 920 780 L 800 780"/>
      <path d="M 1000 640 L 1000 780 L 1120 780"/>
    </g>
    
    <!-- 次级分叉 -->
    <g stroke="#66aadd" stroke-width="2" fill="none" opacity="0.8">
      <path d="M 400 440 L 250 440"/>
      <path d="M 400 640 L 250 640"/>
      <path d="M 1520 440 L 1670 440"/>
      <path d="M 1520 640 L 1670 640"/>
      <path d="M 500 240 L 350 240"/>
      <path d="M 500 840 L 350 840"/>
      <path d="M 1420 240 L 1570 240"/>
      <path d="M 1420 840 L 1570 840"/>
      <path d="M 640 440 L 640 380"/>
      <path d="M 640 640 L 640 700"/>
      <path d="M 1280 440 L 1280 380"/>
      <path d="M 1280 640 L 1280 700"/>
    </g>

    <!-- 路径节点方块 -->
    <g fill="#1a3860" stroke="#66aadd" stroke-width="1.5">
      <rect x="390" y="430" width="20" height="20"/>
      <rect x="390" y="630" width="20" height="20"/>
      <rect x="1510" y="430" width="20" height="20"/>
      <rect x="1510" y="630" width="20" height="20"/>
      <rect x="490" y="330" width="20" height="20"/>
      <rect x="490" y="730" width="20" height="20"/>
      <rect x="1410" y="330" width="20" height="20"/>
      <rect x="1410" y="730" width="20" height="20"/>
      <rect x="790" y="290" width="20" height="20"/>
      <rect x="1110" y="290" width="20" height="20"/>
      <rect x="790" y="770" width="20" height="20"/>
      <rect x="1110" y="770" width="20" height="20"/>
    </g>
  </g>

  <!-- ============ 前景清晰电路层 ============ -->
  <g filter="url(#softBlur)">
    <!-- 向中央汇聚的主光路 -->
    <g stroke="#aaeeff" stroke-width="2" fill="none" opacity="0.9">
      <path d="M 860 540 L 760 540"/>
      <path d="M 1060 540 L 1160 540"/>
      <path d="M 920 460 L 920 360"/>
      <path d="M 1000 460 L 1000 360"/>
      <path d="M 920 620 L 920 720"/>
      <path d="M 1000 620 L 1000 720"/>
      <path d="M 880 500 L 820 500"/>
      <path d="M 1040 500 L 1100 500"/>
      <path d="M 880 580 L 820 580"/>
      <path d="M 1040 580 L 1100 580"/>
    </g>
    
    <!-- 细节小线条（芯片周围的短迹）-->
    <g stroke="#88ccff" stroke-width="1.2" fill="none" opacity="0.75">
      <path d="M 760 540 L 720 540 L 720 500"/>
      <path d="M 1160 540 L 1200 540 L 1200 500"/>
      <path d="M 760 540 L 720 540 L 720 580"/>
      <path d="M 1160 540 L 1200 540 L 1200 580"/>
      <path d="M 820 500 L 780 500 L 780 460"/>
      <path d="M 1100 500 L 1140 500 L 1140 460"/>
      <path d="M 820 580 L 780 580 L 780 620"/>
      <path d="M 1100 580 L 1140 580 L 1140 620"/>
    </g>
  </g>

  <!-- 远处流动的光脉冲（动画）-->
  <g>
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite"
        path="M 400 440 L 640 440 L 640 540 L 860 540"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9">
      <animateMotion dur="3.5s" repeatCount="indefinite"
        path="M 1520 640 L 1280 640 L 1280 540 L 1060 540"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9">
      <animateMotion dur="4s" repeatCount="indefinite"
        path="M 500 240 L 500 340 L 700 340 L 700 490 L 860 490"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9">
      <animateMotion dur="4.5s" repeatCount="indefinite"
        path="M 1420 840 L 1420 740 L 1220 740 L 1220 590 L 1060 590"/>
    </circle>
    <circle cx="0" cy="0" r="2.5" fill="#88ffff" filter="url(#glow)" opacity="0.85">
      <animateMotion dur="3.2s" repeatCount="indefinite"
        path="M 800 300 L 920 300 L 920 440"/>
    </circle>
    <circle cx="0" cy="0" r="2.5" fill="#88ffff" filter="url(#glow)" opacity="0.85">
      <animateMotion dur="3.8s" repeatCount="indefinite"
        path="M 1120 780 L 1000 780 L 1000 640"/>
    </circle>
  </g>

  <!-- ============ 中央芯片（发光主角）============ -->
  <!-- 外层光晕，非常强 -->
  <circle cx="960" cy="540" r="250" fill="#aaeeff" opacity="0.15" filter="url(#bigGlow)"/>
  <circle cx="960" cy="540" r="180" fill="#ffffff" opacity="0.25" filter="url(#bigGlow)"/>

  <!-- 芯片阴影 -->
  <ellipse cx="960" cy="640" rx="160" ry="15" fill="#000000" opacity="0.5" filter="url(#mediumBlur)"/>

  <!-- 芯片底部（透视）-->
  <!-- 左侧面 -->
  <path d="M 820 570 L 820 600 L 960 635 L 960 605 Z" fill="url(#chipSideL)"/>
  <!-- 右侧面 -->
  <path d="M 1100 570 L 1100 600 L 960 635 L 960 605 Z" fill="url(#chipSideR)"/>
  <!-- 前侧面 -->
  <path d="M 820 600 L 960 635 L 1100 600 L 1100 608 L 960 643 L 820 608 Z" fill="#050f25"/>

  <!-- 芯片上表面 (菱形/等轴视角) -->
  <path d="M 960 440 L 1100 510 L 960 580 L 820 510 Z" 
        fill="url(#chipTop)" stroke="#88ccff" stroke-width="1.5" opacity="0.95"/>

  <!-- 芯片表面内层发光核心 -->
  <path d="M 960 465 L 1070 520 L 960 575 L 850 520 Z" 
        fill="#ffffff" opacity="0.4" filter="url(#mediumBlur)"/>
  
  <!-- 芯片表面中心亮点 -->
  <ellipse cx="960" cy="510" rx="60" ry="25" fill="#ffffff" opacity="0.95" filter="url(#glow)"/>
  <ellipse cx="960" cy="510" rx="35" ry="15" fill="#ffffff" opacity="1"/>

  <!-- 芯片表面的极简暗示性图案（非常微弱） -->
  <g opacity="0.4" stroke="#ffffff" stroke-width="0.5" fill="none">
    <path d="M 880 510 L 890 505 L 900 510 L 910 505"/>
    <path d="M 1010 510 L 1020 515 L 1030 510 L 1040 515"/>
    <path d="M 940 485 L 940 495"/>
    <path d="M 980 485 L 980 495"/>
    <path d="M 940 530 L 940 540"/>
    <path d="M 980 530 L 980 540"/>
  </g>

  <!-- 芯片顶部边缘高光 -->
  <path d="M 960 440 L 1100 510" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <path d="M 960 440 L 820 510" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>

  <!-- 从芯片中心发散的最强光芒 -->
  <g filter="url(#bigGlow)" opacity="0.7">
    <circle cx="960" cy="510" r="20" fill="#ffffff"/>
    <circle cx="960" cy="510" r="50" fill="#aaeeff" opacity="0.5"/>
    <circle cx="960" cy="510" r="100" fill="#44bbff" opacity="0.3"/>
  </g>

  <!-- 核心呼吸动画 -->
  <circle cx="960" cy="510" r="80" fill="none" stroke="#aaeeff" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="80;180;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 前景散射粒子/光点（营造氛围） -->
  <g fill="#aaeeff" filter="url(#softBlur)">
    <circle cx="300" cy="300" r="1.5" opacity="0.7"/>
    <circle cx="1620" cy="280" r="1.5" opacity="0.7"/>
    <circle cx="250" cy="780" r="1.5" opacity="0.7"/>
    <circle cx="1680" cy="800" r="1.5" opacity="0.7"/>
    <circle cx="500" cy="500" r="1" opacity="0.6"/>
    <circle cx="1420" cy="560" r="1" opacity="0.6"/>
    <circle cx="600" cy="700" r="1" opacity="0.6"/>
    <circle cx="1350" cy="380" r="1" opacity="0.6"/>
    <circle cx="150" cy="450" r="1.2" opacity="0.7"/>
    <circle cx="1770" cy="620" r="1.2" opacity="0.7"/>
  </g>

  <!-- 极轻微的前景黑色渐变，增加景深（边缘暗角）-->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
